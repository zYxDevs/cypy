name: Build and Release cypy

on:
  push:
    tags:
      - 'v*' # Trigger when pushing tags like v1.0.0, v0.1.0
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run Build Script
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y xvfb libegl1 libgl1 libglx-mesa0
            xvfb-run python build.py
          else
            python build.py
          fi
        shell: bash

      - name: Compile Inno Setup Installer (Windows Only)
        if: matrix.os == 'windows-latest'
        run: |
          iscc setup.iss
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: |
            releases/*.zip
            releases/*.exe

  build-android:
    name: Build APK on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-android
          path: bin/*.apk

  release:
    name: Create Release and Upload Assets
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Organize Release Files
        run: |
          mkdir -p release-files
          find downloaded-artifacts -name "*.zip" -exec cp {} release-files/ \;
          find downloaded-artifacts -name "*.exe" -exec cp {} release-files/ \;
          find downloaded-artifacts -name "*.apk" -exec cp {} release-files/cypy-${{ github.ref_name }}-android.apk \;
          echo "Files to upload:"
          ls -lh release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: cypy ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
